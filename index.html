<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arjun Bharath — Salesforce Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --w:#ffffff;--w-mid:#e8e8e8;--w-dim:#c0c0c0;--w-faint:#888888;--w-trace:#333333;
  --bg:#080808;--bg2:#111111;
  --green:#39ff14;--green-dim:rgba(57,255,20,0.15);
  --sf-blue:#00A1E0;--oracle-red:#C8102E;
}
html,body{width:100%;height:100%;background:var(--bg);font-family:'Share Tech Mono','Courier New',monospace;overflow:hidden;cursor:none}
*{cursor:none!important}

#cursor{position:fixed;width:10px;height:10px;background:var(--w);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width 0.15s,height 0.15s;box-shadow:0 0 6px rgba(255,255,255,0.8)}
#cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(255,255,255,0.6);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width 0.2s,height 0.2s,border-color 0.2s}
body:has(a:hover) #cursor,body:has(button:hover) #cursor,body:has([data-nav]:hover) #cursor{width:16px;height:16px}
body:has(a:hover) #cursor-ring,body:has(button:hover) #cursor-ring,body:has([data-nav]:hover) #cursor-ring{width:46px;height:46px;border-color:rgba(255,255,255,0.9)}

.grid-bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);background-size:44px 44px;animation:gridDrift 28s linear infinite;pointer-events:none}
@keyframes gridDrift{from{transform:translate(0,0)}to{transform:translate(44px,44px)}}
.flash-overlay{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:500;transition:opacity 0.05s}

.nav-logo{font-size:11px;letter-spacing:0.22em;color:var(--w-dim);position:relative;transition:color 0.2s;display:inline-block;}
.nav-logo:hover{color:var(--w)}

#start-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:400;transition:opacity 0.6s ease}
#start-screen.hide{opacity:0;pointer-events:none}
.start-box{text-align:center;position:relative}
.start-tag{font-size:10px;letter-spacing:0.28em;color:var(--w-faint);margin-bottom:36px}
.start-version{font-size:9px;letter-spacing:0.18em;color:var(--w-dim);margin-bottom:24px}
.start-label{font-size:14px;letter-spacing:0.22em;color:var(--w);animation:pulse 1.4s ease-in-out infinite;border:1px solid rgba(255,255,255,0.4);padding:14px 32px;display:inline-block}
.start-hint{font-size:9px;letter-spacing:0.14em;color:var(--w-faint);margin-top:18px}
.start-corners::before,.start-corners::after{content:'';position:absolute;width:12px;height:12px;border-color:var(--w-faint);border-style:solid}
.start-corners::before{top:-10px;left:-10px;border-width:1px 0 0 1px}
.start-corners::after{bottom:-10px;right:-10px;border-width:0 1px 1px 0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}

#loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:flex-start;justify-content:flex-start;padding:52px 60px;z-index:300;transition:opacity 0.6s ease;animation:flicker 5s infinite}
#loader.fade-out{opacity:0;pointer-events:none}
@keyframes flicker{0%,100%{opacity:1}91%{opacity:1}92%{opacity:0.7}93%{opacity:1}97%{opacity:0.88}98%{opacity:1}}
.loader-content{position:relative;z-index:12;width:380px}
.l-tag{font-size:9px;letter-spacing:0.28em;color:var(--w-faint);margin-bottom:18px}
.l-title{font-size:11px;letter-spacing:0.18em;color:var(--w);margin-bottom:8px}
.l-divider{border:none;border-top:1px solid var(--w-trace);margin-bottom:14px}
.log-line{font-size:12px;color:var(--w-dim);line-height:2;min-height:1.95em}
.log-line.dimmed{color:#404040}
.log-line .tc{opacity:0}.log-line .tc.show{opacity:1}
.log-line.glitching{animation:glitch-shift 0.07s steps(1) 3}
@keyframes glitch-shift{0%{transform:translateX(0)}20%{transform:translateX(-2px)}40%{transform:translateX(2px)}60%{transform:translateX(-1px)}80%{transform:translateX(1px)}100%{transform:translateX(0)}}
.progress-row{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:10px;color:var(--w-mid)}
.assets-label{min-width:86px;color:var(--w-faint)}
.bar-track{flex:1;height:6px;background:#111;border:1px solid var(--w-faint);overflow:hidden}
.bar-fill{height:100%;width:0%;background:var(--w);box-shadow:0 0 12px rgba(255,255,255,0.4);transition:width 0.12s ease}
.info-row{font-size:12px;line-height:2.2;display:flex;opacity:0;transform:translateX(-8px);transition:opacity 0.18s ease,transform 0.18s ease}
.info-row.visible{opacity:1;transform:translateX(0)}
.info-key{color:var(--w-faint);min-width:66px}
.info-sep{color:var(--w-dim);margin:0 8px}
.info-val{color:var(--w)}
.transition-line{font-size:12px;color:var(--w);line-height:2;opacity:0;transition:opacity 0.3s ease}
.transition-line.visible{opacity:1}
.cursor-blink{display:inline-block;width:7px;height:13px;background:var(--w);vertical-align:middle;animation:blink 0.85s step-end infinite;margin-left:1px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.page{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity 0.4s ease;overflow:hidden;background:var(--bg)}
.page.visible{opacity:1;pointer-events:all}

.site-nav{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:20px 52px;opacity:0;transform:translateY(-10px);transition:opacity 0.5s ease 0.2s,transform 0.5s ease 0.2s;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);background:rgba(8,8,8,0.6);border-bottom:1px solid rgba(255,255,255,0.06)}
.page.visible .site-nav{opacity:1;transform:translateY(0)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-links{display:flex;gap:20px}
.nav-links a{font-size:9px;color:var(--w-faint);text-decoration:none;letter-spacing:0.2em;transition:color 0.2s;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;right:100%;height:1px;background:var(--w);transition:right 0.22s ease}
.nav-links a:hover,.nav-links a.active{color:var(--w)}
.nav-links a:hover::after,.nav-links a.active::after{right:0}
.nav-sep{width:1px;height:12px;background:var(--w-dim);opacity:0.3}

.snd-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid rgba(255,255,255,0.22);color:var(--w-dim);font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.14em;padding:5px 10px;transition:color 0.2s,border-color 0.2s;user-select:none}
.snd-btn:hover{color:var(--w);border-color:rgba(255,255,255,0.5)}
.snd-btn.muted{color:var(--w-faint);border-color:rgba(255,255,255,0.1)}
.tog-icon{display:flex;align-items:center;gap:2px}
.tog-icon span{display:inline-block;width:2px;background:currentColor;border-radius:1px;transition:height 0.18s,opacity 0.18s}
.tog-icon span:nth-child(1){height:3px}.tog-icon span:nth-child(2){height:7px}.tog-icon span:nth-child(3){height:11px}.tog-icon span:nth-child(4){height:7px}.tog-icon span:nth-child(5){height:3px}
.snd-btn.muted .tog-icon span{height:2px!important;opacity:0.2}

.bgm-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid rgba(255,255,255,0.22);color:var(--w-dim);font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.14em;padding:5px 10px;transition:color 0.2s,border-color 0.2s;user-select:none}
.bgm-btn:hover{color:var(--w);border-color:rgba(255,255,255,0.5)}
.bgm-btn.playing{color:hsl(18, 94%, 50%);border-color:#f55708;text-shadow:0 0 8px rgba(237, 27, 4, 0.4)}
.bgm-eq{display:flex;align-items:flex-end;gap:2px;height:11px;margin-right:2px;opacity:0.35;transition:opacity 0.2s}
.bgm-btn.playing .bgm-eq{opacity:1}
.bgm-eq span{display:inline-block;width:2px;background:currentColor;border-radius:1px;transform-origin:bottom;height:3px}
.bgm-btn.playing .bgm-eq span:nth-child(1){animation:eq1 0.5s ease-in-out infinite alternate}
.bgm-btn.playing .bgm-eq span:nth-child(2){animation:eq2 0.4s ease-in-out infinite alternate 0.1s}
.bgm-btn.playing .bgm-eq span:nth-child(3){animation:eq3 0.6s ease-in-out infinite alternate 0.05s}
.bgm-btn.playing .bgm-eq span:nth-child(4){animation:eq4 0.45s ease-in-out infinite alternate 0.15s}
@keyframes eq1{from{height:3px}to{height:10px}}@keyframes eq2{from{height:7px}to{height:3px}}
@keyframes eq3{from{height:10px}to{height:5px}}@keyframes eq4{from{height:4px}to{height:9px}}

.nav-burger{display:none;flex-direction:column;justify-content:center;align-items:center;gap:5px;background:transparent;border:1px solid rgba(255,255,255,0.22);padding:7px 9px;z-index:22}
.nav-burger span{display:block;width:16px;height:1px;background:var(--w-dim);transition:transform 0.3s,opacity 0.3s,width 0.3s;transform-origin:center}
.nav-burger.open span:nth-child(1){transform:translateY(6px) rotate(45deg);background:var(--w)}
.nav-burger.open span:nth-child(2){opacity:0;width:0}
.nav-burger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg);background:var(--w)}

#mob-menu{display:none;position:fixed;inset:0;z-index:100;background:rgba(8,8,8,0.98);flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
#mob-menu.open{opacity:1;pointer-events:all}
.mob-close{position:absolute;top:22px;right:22px;background:transparent;border:1px solid rgba(255,255,255,0.25);color:var(--w-dim);font-family:'Share Tech Mono',monospace;font-size:11px;padding:8px 14px;letter-spacing:0.1em;transition:color 0.2s,border-color 0.2s}
.mob-close:hover{color:var(--w);border-color:var(--w)}
.mob-links{display:flex;flex-direction:column;align-items:center;gap:0}
.mob-links a{font-size:20px;letter-spacing:0.22em;color:var(--w-faint);text-decoration:none;padding:13px 0;transition:color 0.2s;position:relative}
.mob-links a::after{content:'';position:absolute;bottom:8px;left:50%;right:50%;height:1px;background:var(--w);transition:left 0.25s,right 0.25s}
.mob-links a:hover,.mob-links a.active{color:var(--w)}
.mob-links a:hover::after,.mob-links a.active::after{left:0;right:0}
.mob-snd{margin-top:32px;display:flex;gap:14px;align-items:center}

#home-video-bg{position:absolute;inset:0;z-index:1;overflow:hidden}
#home-video-bg video{width:100%;height:100%;object-fit:cover;display:block;transform:scale(1.28)}
#home-video-bg .video-dim{position:absolute;inset:0;background:rgba(0,0,0,0.72)}

#home .home-wrap{position:relative;z-index:5;width:100%;height:100%;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:0 80px;gap:60px}
.home-eyebrow{font-size:9px;letter-spacing:0.3em;color:var(--w-dim);margin-bottom:22px;opacity:0;transform:translateX(-14px);transition:opacity 0.5s ease 0.4s,transform 0.5s ease 0.4s;display:flex;align-items:center;gap:12px}
.home-eyebrow::before{content:'';display:inline-block;width:20px;height:1px;background:var(--w-faint)}
#home.visible .home-eyebrow{opacity:1;transform:translateX(0)}
.home-name-row{display:flex;align-items:center;gap:26px;opacity:0;transform:translateY(22px);transition:opacity 0.7s ease 0.5s,transform 0.7s ease 0.5s}
#home.visible .home-name-row{opacity:1;transform:translateY(0)}
.home-photo-wrap{position:relative;flex-shrink:0}
.home-photo{width:92px;height:120px;border-radius:4px;object-fit:cover;object-position:top center;border:1px solid rgba(255,255,255,0.25);box-shadow:0 0 0 3px rgba(255,255,255,0.06),0 8px 32px rgba(0,0,0,0.6);display:block}
.home-photo-ring{position:absolute;inset:-4px;border-radius:6px;border:1px solid rgba(255,255,255,0.12);animation:photoRing 3s ease-in-out infinite;pointer-events:none}
@keyframes photoRing{0%,100%{opacity:0.4}50%{opacity:0.9}}
.home-name{font-size:clamp(40px,5.5vw,78px);color:var(--w);line-height:0.92;text-shadow:0 0 80px rgba(255,255,255,0.06)}
.home-name .first{display:block}.home-name .last{display:block;color:var(--w-dim)}
.home-title{font-size:12px;color:var(--w-mid);margin-top:20px;letter-spacing:0.08em;opacity:0;transform:translateY(10px);transition:opacity 0.5s ease 0.72s,transform 0.5s ease 0.72s;display:flex;align-items:center;gap:10px}
.home-title::before{content:'▸';font-size:8px;color:var(--green);opacity:0.7}
#home.visible .home-title{opacity:1;transform:translateY(0)}
.home-rule{width:0;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.5),transparent);margin:28px 0;transition:width 0.7s ease 0.88s}
#home.visible .home-rule{width:80px}
.home-summary{font-size:12px;color:var(--w-dim);line-height:2.05;max-width:400px;opacity:0;transform:translateY(8px);transition:opacity 0.5s ease 0.98s,transform 0.5s ease 0.98s}
#home.visible .home-summary{opacity:1;transform:translateY(0)}
.home-avail{display:inline-flex;align-items:center;gap:8px;margin-top:20px;font-size:8px;letter-spacing:0.22em;color:var(--green);border:1px solid rgba(57,255,20,0.3);padding:6px 14px;background:rgba(57,255,20,0.04);opacity:0;transform:translateY(6px);transition:opacity 0.5s ease 1.05s,transform 0.5s ease 1.05s}
#home.visible .home-avail{opacity:1;transform:translateY(0)}
.avail-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:dotpulse 2s ease-in-out infinite;box-shadow:0 0 6px var(--green)}

.home-cta{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap;opacity:0;transform:translateY(8px);transition:opacity 0.5s ease 1.12s,transform 0.5s ease 1.12s}
#home.visible .home-cta{opacity:1;transform:translateY(0)}
.btn-primary{font-size:9px;letter-spacing:0.2em;color:var(--w);border:1px solid rgba(255,255,255,0.5);padding:12px 22px;text-decoration:none;background:transparent;font-family:'Share Tech Mono',monospace;transition:background 0.2s,border-color 0.2s;position:relative;overflow:hidden}
.btn-primary::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.05);transform:translateX(-100%);transition:transform 0.3s}
.btn-primary:hover::before{transform:translateX(0)}
.btn-primary:hover{border-color:var(--w)}
.btn-ghost{font-size:9px;letter-spacing:0.2em;color:var(--w-faint);border:1px solid rgba(255,255,255,0.15);padding:12px 18px;text-decoration:none;background:transparent;font-family:'Share Tech Mono',monospace;transition:color 0.2s,border-color 0.2s}
.btn-ghost:hover{color:var(--w);border-color:rgba(255,255,255,0.4)}
.btn-download{font-size:9px;letter-spacing:0.18em;color:var(--bg);border:1px solid var(--w);padding:12px 20px;text-decoration:none;background:var(--w);font-family:'Share Tech Mono',monospace;transition:background 0.2s,color 0.2s;display:inline-flex;align-items:center;gap:7px;position:relative;overflow:hidden}
.btn-download:hover{background:transparent;color:var(--w)}

.home-right{display:flex;flex-direction:column;align-items:flex-end;opacity:0;transform:translateX(20px);transition:opacity 0.6s ease 0.78s,transform 0.6s ease 0.78s}
#home.visible .home-right{opacity:1;transform:translateX(0)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--w-trace);width:100%;max-width:380px}
.stat-cell{background:var(--bg);padding:26px 22px;transition:background 0.2s;position:relative;overflow:hidden}
.stat-cell::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:linear-gradient(90deg,var(--w-faint),transparent);transition:width 0.3s}
.stat-cell:hover{background:var(--bg2)}.stat-cell:hover::after{width:100%}
.stat-num{font-size:clamp(26px,3vw,40px);color:var(--w);line-height:1;margin-bottom:6px}
.stat-label{font-size:9px;letter-spacing:0.16em;color:var(--w-dim)}
.home-cert-strip{margin-top:1px;background:var(--bg);width:100%;max-width:380px;border-top:1px solid var(--w-trace);padding:16px 22px}
.cert-strip-label{font-size:8px;letter-spacing:0.24em;color:var(--w-dim);margin-bottom:10px}
.cert-chips{display:flex;flex-wrap:wrap;gap:6px}
.cert-chip{font-size:8px;letter-spacing:0.08em;color:var(--w-dim);border:1px solid rgba(255,255,255,0.2);padding:3px 8px;transition:border-color 0.2s,color 0.2s}
.cert-chip:hover{border-color:rgba(255,255,255,0.5);color:var(--w)}
.home-stack{margin-top:1px;background:var(--bg);width:100%;max-width:380px;padding:14px 22px;border-top:1px solid var(--w-trace)}
.stack-label{font-size:8px;letter-spacing:0.24em;color:var(--w-dim);margin-bottom:10px}
.stack-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.stack-name{font-size:8px;color:var(--w-faint);letter-spacing:0.1em;min-width:100px}
.stack-bar-bg{flex:1;height:2px;background:var(--w-trace)}
.stack-bar-fill{height:100%;background:linear-gradient(90deg,var(--w-faint),var(--w));width:0;transition:width 1.2s ease}
#home.visible .stack-bar-fill{width:var(--pct)}
.corner-tag{position:absolute;bottom:32px;left:80px;font-size:9px;color:var(--w-faint);letter-spacing:0.1em;z-index:5;opacity:0;transition:opacity 0.5s ease 1.4s}
#home.visible .corner-tag{opacity:1}
.status-dot{position:absolute;bottom:34px;right:60px;z-index:5;display:flex;align-items:center;gap:8px;opacity:0;transition:opacity 0.5s ease 1.5s}
#home.visible .status-dot{opacity:1}
.dot-pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:dotpulse 2s ease-in-out infinite;box-shadow:0 0 8px var(--green)}
@keyframes dotpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.7)}}
.dot-label{font-size:8px;letter-spacing:0.18em;color:var(--w-dim)}

.page-content{position:relative;z-index:5;width:100%;height:100%;overflow-y:auto;padding:100px 80px 80px;scrollbar-width:thin;scrollbar-color:var(--w-faint) transparent}
.page-content.fw{padding-left:0;padding-right:0}
.page-content.fw .page-header{padding-left:80px;padding-right:80px}
.page-content::-webkit-scrollbar{width:2px}
.page-content::-webkit-scrollbar-thumb{background:var(--w-faint);border-radius:2px}
.page-header{margin-bottom:44px;opacity:0;transform:translateY(14px);transition:opacity 0.5s ease 0.3s,transform 0.5s ease 0.3s}
.page.visible .page-header{opacity:1;transform:translateY(0)}
.page-label{font-size:8px;letter-spacing:0.34em;color:var(--w-dim);margin-bottom:10px}
.page-title{font-size:clamp(28px,4.2vw,48px);color:var(--w);line-height:1.1}
.page-rule{width:34px;height:1px;background:rgba(255,255,255,0.35);margin-top:16px}

.work-body{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--w-trace);opacity:0;transform:translateY(12px);transition:opacity 0.5s ease 0.42s,transform 0.5s ease 0.42s}
.page.visible .work-body{opacity:1;transform:translateY(0)}
.work-col{background:var(--bg);padding:40px 52px}
.work-col-label{font-size:8px;letter-spacing:0.3em;color:var(--w-dim);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--w-trace)}
.about-para{font-size:12px;color:var(--w-dim);line-height:2.15;margin-bottom:20px}
.about-para span{color:var(--w)}
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--w-trace);margin-top:28px}
.skill-cell{background:var(--bg2);padding:18px 20px;transition:background 0.2s}
.skill-cell:hover{background:rgba(20,20,20,1)}
.skill-cat{font-size:8px;letter-spacing:0.22em;color:var(--w-dim);margin-bottom:10px}
.skill-items{font-size:11px;color:var(--w-faint);line-height:2.1}

.exp-list{display:flex;flex-direction:column}
.exp-item{border-top:1px solid var(--w-trace);padding:32px 0;display:grid;grid-template-columns:210px 1fr;gap:0 44px;opacity:0;transform:translateY(12px);transition:opacity 0.4s ease,transform 0.4s ease}
.exp-item:last-child{border-bottom:1px solid var(--w-trace)}
.page.visible .exp-item:nth-child(1){opacity:1;transform:none;transition-delay:0.42s}
.page.visible .exp-item:nth-child(2){opacity:1;transform:none;transition-delay:0.52s}
.page.visible .exp-item:nth-child(3){opacity:1;transform:none;transition-delay:0.62s}
.exp-logo{display:block;width:52px;height:52px;object-fit:contain;padding:7px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0
