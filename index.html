<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arjun Bharath — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --w:       #ffffff;
      --w-mid:   #cccccc;
      --w-dim:   #888888;
      --w-faint: #444444;
      --w-trace: #1e1e1e;
      --bg:      #090909;
      --scan:    rgba(255,255,255,0.022);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      overflow: hidden;
    }

    /* ── START SCREEN ── */
    #start-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 300; cursor: pointer; transition: opacity 0.5s ease;
    }
    #start-screen.hide { opacity: 0; pointer-events: none; }
    #start-box { text-align: center; }
    #start-tag { font-size: 11px; letter-spacing: 0.2em; color: var(--w-faint); margin-bottom: 28px; }
    #start-label {
      font-size: 13px; letter-spacing: 0.18em; color: var(--w);
      animation: pulse 1.4s ease-in-out infinite;
    }
    #start-hint { font-size: 10px; letter-spacing: 0.12em; color: var(--w-faint); margin-top: 14px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── LOADER ── */
    #loader {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: flex-start; justify-content: flex-start;
      padding: 44px 52px; z-index: 100; transition: opacity 0.6s ease;
    }
    #loader.fade-out { opacity: 0; pointer-events: none; }
    #loader::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, var(--scan) 3px, var(--scan) 4px);
      pointer-events: none; z-index: 10;
    }
    #loader::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 48%, rgba(0,0,0,0.72) 100%);
      pointer-events: none; z-index: 11;
    }

    /* glitch flicker on loader */
    @keyframes flicker {
      0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.7} 94%{opacity:1} 97%{opacity:0.85} 98%{opacity:1}
    }
    #loader { animation: flicker 4s infinite; }

    .loader-content { position: relative; z-index: 12; width: 340px; }
    .section { margin-bottom: 30px; }

    .section-title { font-size: 12px; letter-spacing: 0.14em; color: var(--w); margin-bottom: 8px; }
    .divider { border: none; border-top: 1px solid var(--w-trace); margin-bottom: 16px; }

    /* typed log lines - characters appear one by one */
    .log-line {
      font-size: 12px; color: var(--w-mid); line-height: 1.95; min-height: 1.95em;
    }
    .log-line.dimmed { color: #2a2a2a; }
    .log-line .prompt { color: var(--w-dim); margin-right: 4px; }
    .log-line .typed-char { opacity: 0; }
    .log-line .typed-char.show { opacity: 1; }

    /* glitch text effect on active line */
    @keyframes glitch-shift {
      0%{transform:translateX(0)} 20%{transform:translateX(-2px)} 40%{transform:translateX(2px)}
      60%{transform:translateX(-1px)} 80%{transform:translateX(1px)} 100%{transform:translateX(0)}
    }
    .log-line.glitching { animation: glitch-shift 0.08s steps(1) 3; }

    .progress-row {
      display: flex; align-items: center; gap: 10px;
      margin-top: 12px; font-size: 11px; color: var(--w-mid);
    }
    .assets-label { min-width: 80px; color: var(--w-dim); }
    .bar-track { flex: 1; height: 7px; background: #111; border: 1px solid var(--w-faint); overflow: hidden; }
    .bar-fill {
      height: 100%; width: 0%; background: var(--w);
      box-shadow: 0 0 10px rgba(255,255,255,0.3);
      transition: width 0.25s ease;
    }

    .info-row {
      font-size: 12px; line-height: 2.1; display: flex;
      opacity: 0; transform: translateX(-8px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
    .info-row.visible { opacity: 1; transform: translateX(0); }
    .info-key { color: var(--w-dim); min-width: 60px; }
    .info-sep { color: var(--w-faint); margin: 0 6px; }
    .info-val { color: var(--w); }

    .transition-line { font-size: 12px; color: var(--w-mid); line-height: 2; opacity: 0; transition: opacity 0.3s ease; }
    .transition-line.visible { opacity: 1; }

    .cursor {
      display: inline-block; width: 8px; height: 13px; background: var(--w);
      vertical-align: middle; animation: blink 0.85s step-end infinite; margin-left: 1px;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .flash-overlay {
      position: fixed; inset: 0; background: #fff;
      opacity: 0; pointer-events: none; z-index: 200; transition: opacity 0.06s;
    }

    /* ── HOME PAGE ── */
    #home {
      position: fixed; inset: 0; opacity: 0; pointer-events: none;
      transition: opacity 0.9s ease; overflow: hidden; background: var(--bg);
    }
    #home.visible { opacity: 1; pointer-events: all; }

    #home::before {
      content: ''; position: absolute; inset: -50%; width: 200%; height: 200%;
      background-image:
        linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.028) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridDrift 22s linear infinite; z-index: 0;
    }
    @keyframes gridDrift { from{transform:translate(0,0)} to{transform:translate(48px,48px)} }
    #home::after {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.015) 3px, rgba(255,255,255,0.015) 4px);
      pointer-events: none; z-index: 1;
    }

    .home-content {
      position: relative; z-index: 2; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center; padding: 0 80px;
    }
    .home-tag {
      font-size: 11px; letter-spacing: 0.22em; color: var(--w-faint); margin-bottom: 20px;
      opacity: 0; transform: translateY(12px); transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;
    }
    #home.visible .home-tag { opacity: 1; transform: translateY(0); }

    .home-name {
      font-size: clamp(40px, 6.5vw, 78px); color: var(--w); line-height: 1.05;
      text-shadow: 0 0 40px rgba(255,255,255,0.1);
      opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease 0.25s, transform 0.6s ease 0.25s;
    }
    #home.visible .home-name { opacity: 1; transform: translateY(0); }

    .home-role {
      font-size: 13px; color: var(--w-mid); margin-top: 18px; letter-spacing: 0.06em;
      opacity: 0; transform: translateY(10px); transition: opacity 0.5s ease 0.45s, transform 0.5s ease 0.45s;
    }
    #home.visible .home-role { opacity: 1; transform: translateY(0); }

    .home-divider {
      width: 60px; height: 1px; background: var(--w-faint); margin: 30px 0;
      opacity: 0; transition: opacity 0.5s ease 0.6s;
    }
    #home.visible .home-divider { opacity: 1; }

    .home-links {
      display: flex; gap: 32px; opacity: 0; transform: translateY(10px);
      transition: opacity 0.5s ease 0.75s, transform 0.5s ease 0.75s;
    }
    #home.visible .home-links { opacity: 1; transform: translateY(0); }
    .home-links a {
      font-size: 12px; color: var(--w-dim); text-decoration: none;
      letter-spacing: 0.12em; transition: color 0.2s;
    }
    .home-links a:hover { color: var(--w); }

    .corner-tag {
      position: absolute; bottom: 36px; right: 52px; font-size: 11px;
      color: var(--w-trace); letter-spacing: 0.1em; z-index: 2;
      opacity: 0; transition: opacity 0.5s ease 1s;
    }
    #home.visible .corner-tag { opacity: 1; }

    /* ── SOUND TOGGLE ── */
    #sound-toggle {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      z-index: 500; display: flex; align-items: center; gap: 10px;
      background: transparent; border: 1px solid var(--w-faint);
      color: var(--w-dim); font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: 0.14em; padding: 8px 18px;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
      user-select: none;
    }
    #sound-toggle:hover { border-color: var(--w-dim); color: var(--w); }
    #sound-toggle.muted { border-color: var(--w-trace); color: var(--w-faint); }
    .toggle-icon { display: flex; align-items: center; gap: 3px; }
    .toggle-icon span {
      display: inline-block; width: 2px; background: currentColor;
      border-radius: 1px; transition: height 0.18s ease, opacity 0.18s;
    }
    .toggle-icon span:nth-child(1) { height: 5px; }
    .toggle-icon span:nth-child(2) { height: 9px; }
    .toggle-icon span:nth-child(3) { height: 13px; }
    .toggle-icon span:nth-child(4) { height: 9px; }
    .toggle-icon span:nth-child(5) { height: 5px; }
    #sound-toggle.muted .toggle-icon span { height: 2px !important; opacity: 0.25; }
  </style>
</head>
<body>

  <div class="flash-overlay" id="flash"></div>
  <!-- SOUND TOGGLE -->
  <button id="sound-toggle" title="Toggle sound">
    <div class="toggle-icon">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <span id="toggle-label">SOUND ON</span>
  </button>


  <!-- START SCREEN -->
  <div id="start-screen">
    <div id="start-box">
      <div id="start-tag">// PORTFOLIO_v1.0</div>
      <div id="start-label">[ CLICK TO INITIALIZE ]</div>
      <div id="start-hint">sound on recommended</div>
    </div>
  </div>

  <!-- LOADER -->
  <div id="loader">
    <div class="loader-content">
      <div class="section">
        <div class="section-title">LOADING</div>
        <hr class="divider">
        <div id="log-container"></div>
        <div class="progress-row" id="progress-row" style="display:none">
          <span class="assets-label" id="assets-label">Assets : 0 / 20</span>
          <div class="bar-track"><div class="bar-fill" id="bar-fill"></div></div>
        </div>
      </div>

      <div class="section" id="welcome-section" style="display:none">
        <div class="section-title">WELCOME</div>
        <hr class="divider">
        <div id="info-container"></div>
      </div>

      <div class="section" id="transition-section" style="display:none">
        <div class="transition-line" id="trans-line1">Transitioning to scene...</div>
        <div class="transition-line" id="trans-line2">_ <span class="cursor"></span></div>
      </div>
    </div>
  </div>

  <!-- HOME -->
  <div id="home">
    <div class="home-content">
      <div class="home-tag">// PORTFOLIO_v1.0</div>
      <div class="home-name">Arjun<br>Bharath</div>
      <div class="home-role">Sr. Developer &nbsp;—&nbsp; Salesforce / Frontend</div>
      <div class="home-divider"></div>
      <div class="home-links">
        <a href="#">Work</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </div>
    </div>
    <div class="corner-tag">KERALA, INDIA &nbsp;/&nbsp; TRAVELLER</div>
  </div>

  <script>
    const logMessages = [
      'Loading environment...',
      'Setting up WebGL environment...',
      'Optimizing render pipeline...',
      'Initializing hand input system...',
      '> Just a moment...',
    ];

    const infoData = [
      ['NAME',     'Arjun Bharath'],
      ['ROLE',     'Sr. Developer'],
      ['FIELD',    'Salesforce / Frontend'],
      ['FROM',     'Kerala, India'],
      ['INTEREST', 'Travelling'],
    ];

    const logContainer      = document.getElementById('log-container');
    const progressRow       = document.getElementById('progress-row');
    const barFill           = document.getElementById('bar-fill');
    const assetsLabel       = document.getElementById('assets-label');
    const welcomeSection    = document.getElementById('welcome-section');
    const infoContainer     = document.getElementById('info-container');
    const transitionSection = document.getElementById('transition-section');
    const transLine1        = document.getElementById('trans-line1');
    const transLine2        = document.getElementById('trans-line2');
    const loader            = document.getElementById('loader');
    const home              = document.getElementById('home');
    const flash             = document.getElementById('flash');
    const startScreen       = document.getElementById('start-screen');

    const delay = ms => new Promise(r => setTimeout(r, ms));

    /* ════════════════════════════════════════════
       AUDIO ENGINE — Glitch + Typing sounds
       All synthesised via Web Audio API.
    ════════════════════════════════════════════ */
    let audioCtx = null;
    const getCtx = () => {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    };

    let master = null;
    const getMaster = () => {
      if (master) return master;
      const ctx = getCtx();
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -16; comp.knee.value = 8;
      comp.ratio.value = 5; comp.attack.value = 0.002; comp.release.value = 0.1;
      comp.connect(ctx.destination);
      master = comp; return master;
    };

    // ── TYPING CLICK ──
    // Short filtered noise burst — mechanical key press feel
    function playTypingClick() {
      const ctx = getCtx(), out = getMaster();
      const bufLen = Math.floor(ctx.sampleRate * 0.018);
      const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) d[i] = (Math.random() * 2 - 1);

      const src = ctx.createBufferSource();
      src.buffer = buf;

      // bandpass around 2–4kHz = clicky mechanical key
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 2200 + Math.random() * 1600;
      bp.Q.value = 1.8;

      // sharp transient envelope
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.22, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.018);

      src.connect(bp); bp.connect(gain); gain.connect(out);
      src.start(); src.stop(ctx.currentTime + 0.022);
    }

    // ── GLITCH BURST ──
    // Sparse noise through bandpass, random pitch — corrupted data feel
    function playGlitch(vol = 0.18, dur = 0.07) {
      const ctx = getCtx(), out = getMaster();
      const bufLen = Math.floor(ctx.sampleRate * dur);
      const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) {
        d[i] = Math.random() < 0.5 ? (Math.random() * 2 - 1) : 0;
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      src.playbackRate.value = 0.6 + Math.random() * 0.9;

      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 900 + Math.random() * 2200;
      bp.Q.value = 0.5 + Math.random() * 1.4;

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);

      src.connect(bp); bp.connect(gain); gain.connect(out);
      src.start(); src.stop(ctx.currentTime + dur + 0.01);
    }

    // ── PROGRESS TICK ──
    // Tiny glitch blip per asset — fast sparse noise spike
    function playTick() {
      const ctx = getCtx(), out = getMaster();
      const bufLen = Math.floor(ctx.sampleRate * 0.012);
      const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) d[i] = Math.random() < 0.4 ? (Math.random()*2-1) : 0;
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const hp = ctx.createBiquadFilter();
      hp.type = 'highpass'; hp.frequency.value = 3000;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.14, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.012);
      src.connect(hp); hp.connect(gain); gain.connect(out);
      src.start(); src.stop(ctx.currentTime + 0.015);
    }

    // ── SCAN HUM ──
    // Low electrical hum during progress bar
    let humSrc = null, humGain = null;
    function startHum() {
      const ctx = getCtx(), out = getMaster();
      humSrc = ctx.createOscillator();
      humSrc.type = 'sawtooth'; humSrc.frequency.value = 55;
      const lp = ctx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 280; lp.Q.value = 1.5;
      humGain = ctx.createGain();
      humGain.gain.setValueAtTime(0, ctx.currentTime);
      humGain.gain.linearRampToValueAtTime(0.045, ctx.currentTime + 0.4);
      humSrc.connect(lp); lp.connect(humGain); humGain.connect(out);
      humSrc.start();
    }
    function stopHum() {
      if (!humGain || !audioCtx) return;
      humGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
      setTimeout(() => { try { humSrc.stop(); } catch(e){} }, 600);
    }

    // ── TRANSITION GLITCH BLAST ──
    // 5 overlapping glitch bursts + pitch-drop for scene change
    function playTransitionBlast() {
      for (let i = 0; i < 5; i++) {
        setTimeout(() => playGlitch(0.25 + Math.random()*0.1, 0.1 + Math.random()*0.08), i * 40);
      }
      // pitch sweep down
      setTimeout(() => {
        const ctx = getCtx(), out = getMaster();
        const osc = ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(900, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.5);
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
        osc.connect(gain); gain.connect(out);
        osc.start(); osc.stop(ctx.currentTime + 0.55);
      }, 100);
    }

    /* ════════ TYPE-OUT ANIMATION ════════
       Each character typed one at a time with
       a typing click sound per character.
    ════════════════════════════════════ */
    async function typeLine(containerEl, text, isPrompt = false) {
      const line = document.createElement('div');
      line.className = 'log-line';
      containerEl.appendChild(line);

      const chars = text.split('');
      for (let i = 0; i < chars.length; i++) {
        const span = document.createElement('span');
        span.className = 'typed-char';
        span.textContent = chars[i];
        line.appendChild(span);
        await delay(10);
        span.classList.add('show');

        // typing click on most characters, occasional glitch spike
        if (chars[i] !== ' ') {
          playTypingClick();
          if (Math.random() < 0.06) {
            // random glitch flicker during typing
            setTimeout(() => playGlitch(0.09, 0.04), 5);
            line.classList.add('glitching');
            setTimeout(() => line.classList.remove('glitching'), 10000);
          }
        }
        await delay(28 + Math.random() * 32);
      }
      await delay(120);
      return line;
    }

    async function animateProgress() {
      progressRow.style.display = 'flex';
      startHum();
      const total = 20;
      for (let i = 1; i <= total; i++) {
        await delay(90 + Math.random() * 80);
        assetsLabel.textContent = `Assets : ${i} / ${total}`;
        barFill.style.width = `${(i / total) * 100}%`;
        playTick();
        // occasional glitch burst mid-load
        if (Math.random() < 0.3) setTimeout(() => playGlitch(0.12, 0.05), 20);
      }
      stopHum();
      await delay(260);
    }

    async function showWelcome() {
      welcomeSection.style.display = 'block';
      for (const [key, val] of infoData) {
        const row = document.createElement('div');
        row.className = 'info-row';
        row.innerHTML = `<span class="info-key">${key}</span><span class="info-sep"> : </span><span class="info-val">${val}</span>`;
        infoContainer.appendChild(row);
        await delay(40);
        row.classList.add('visible');
        playTypingClick();
        await delay(150);
      }
    }

    async function run() {
      // opening glitch burst on start
      playGlitch(0.2, 0.12);
      setTimeout(() => playGlitch(0.15, 0.08), 80);
      await delay(500);

      for (const msg of logMessages) {
        await typeLine(logContainer, msg);
      }

      await animateProgress();

      logContainer.querySelectorAll('.log-line').forEach(l => l.classList.add('dimmed'));

      await delay(300);
      await showWelcome();
      await delay(600);

      transitionSection.style.display = 'block';
      await delay(40);
      transLine1.classList.add('visible');
      playGlitch(0.1, 0.06);
      await delay(300);
      transLine2.classList.add('visible');
      await delay(1400);

      playTransitionBlast();
      await delay(160);
      flash.style.opacity = '0.22';
      await delay(65);
      flash.style.opacity = '0';
      await delay(85);
      flash.style.opacity = '0.1';
      await delay(55);
      flash.style.opacity = '0';

      loader.classList.add('fade-out');
      await delay(320);
      loader.style.display = 'none';
      home.classList.add('visible');
    }


    /* ── SOUND TOGGLE ── */
    let soundEnabled = true;
    const toggleBtn = document.getElementById('sound-toggle');
    const toggleLabel = document.getElementById('toggle-label');

    toggleBtn.addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      if (soundEnabled) {
        toggleBtn.classList.remove('muted');
        toggleLabel.textContent = 'SOUND ON';
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      } else {
        toggleBtn.classList.add('muted');
        toggleLabel.textContent = 'SOUND OFF';
        if (audioCtx) audioCtx.suspend();
      }
    });

    startScreen.addEventListener('click', () => {
      getCtx().resume();
      startScreen.classList.add('hide');
      setTimeout(() => { startScreen.style.display = 'none'; }, 500);
      run();
    }, { once: true });
  </script>
</body>
</html>
